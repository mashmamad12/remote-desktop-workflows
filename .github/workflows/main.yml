name: 'WireGuard VPN'

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-latest
    steps:
      - name: نصب WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard

      - name: نصب wg-easy
        run: |
          docker run -d \
            --name=wg-easy \
            -e WG_HOST=$(curl -s ifconfig.me) \
            -e PASSWORD=Admin123! \
            -p 51820:51820/udp \
            -p 51821:51821/tcp \
            -v ~/wg-data:/etc/wireguard \
            --cap-add=NET_ADMIN \
            --cap-add=SYS_MODULE \
            weejewel/wg-easy

      - name: صبر برای آماده شدن
        run: sleep 20

      - name: نمایش آی‌پی سرور
        run: |
          IP=$(curl -s ifconfig.me)
          echo "آی‌پی سرور: $IP"
          echo "پورت: 51820"
          echo "رمز مدیریت: Admin123!"

      - name: اضافه کردن کلاینت با استفاده از داکر
        run: |
          echo "اضافه کردن کلاینت جدید..."
          docker exec wg-easy sh -c "echo 'yes' | wg-easy add-client myphone"

      - name: خواندن فایل کانفیگ کلاینت
        run: |
          echo "=== کانفیگ کلاینت === "
          cat ~/wg-data/wg0.conf
          echo "====================="

      - name: بررسی فایل کلاینت
        run: |
          echo "=== فایل کلاینت myphone ==="
          docker exec wg-easy cat /etc/wireguard/myphone.conf 2>/dev/null || echo "فایل کلاینت پیدا نشد"
          echo ""

      - name: نگهداری اتصال
        run: sleep 21600
