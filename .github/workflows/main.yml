name: 'WireGuard VPN'

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-latest
    steps:
      - name: نصب WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard

      - name: فعال کردن IP Forwarding
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1

      - name: ساخت کلیدها و کانفیگ
        run: |
          # ساخت دایرکتوری
          sudo mkdir -p /etc/wireguard
          cd /etc/wireguard
          
          # ساخت کلید سرور
          sudo umask 077
          sudo wg genkey | sudo tee privatekey | sudo wg pubkey | sudo tee publickey
          
          # ساخت کلید کلاینت
          sudo wg genkey | sudo tee client_privatekey | sudo wg pubkey | sudo tee client_publickey
          
          # ذخیره متغیرها
          IP=$(curl -s ifconfig.me)
          SERVER_PRIVATE_KEY=$(sudo cat privatekey)
          CLIENT_PUBLIC_KEY=$(sudo cat client_publickey)
          
          # نوشتن فایل کانفیگ (خط به خط)
          sudo bash -c "echo '[Interface]' > wg0.conf"
          sudo bash -c "echo 'PrivateKey = $SERVER_PRIVATE_KEY' >> wg0.conf"
          sudo bash -c "echo 'Address = 10.0.0.1/24' >> wg0.conf"
          sudo bash -c "echo 'ListenPort = 51820' >> wg0.conf"
          sudo bash -c "echo 'PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE' >> wg0.conf"
          sudo bash -c "echo 'PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE' >> wg0.conf"
          sudo bash -c "echo '' >> wg0.conf"
          sudo bash -c "echo '[Peer]' >> wg0.conf"
          sudo bash -c "echo 'PublicKey = $CLIENT_PUBLIC_KEY' >> wg0.conf"
          sudo bash -c "echo 'AllowedIPs = 10.0.0.2/32' >> wg0.conf"
          
          # ذخیره آی‌پی برای مرحله بعد
          echo "SERVER_IP=$IP" >> $GITHUB_ENV

      - name: راه‌اندازی WireGuard
        run: |
          sudo wg-quick up wg0
          sudo wg show

      - name: نمایش کانفیگ کلاینت
        run: |
          SERVER_PUBLIC_KEY=$(sudo cat /etc/wireguard/publickey)
          CLIENT_PRIVATE_KEY=$(sudo cat /etc/wireguard/client_privatekey)
          
          echo "=========================================="
          echo "کانفیگ کلاینت - کد زیر را کامل کپی کن"
          echo "=========================================="
          echo ""
          echo "[Interface]"
          echo "PrivateKey = $CLIENT_PRIVATE_KEY"
          echo "Address = 10.0.0.2/24"
          echo "DNS = 1.1.1.1"
          echo ""
          echo "[Peer]"
          echo "PublicKey = $SERVER_PUBLIC_KEY"
          echo "AllowedIPs = 0.0.0.0/0"
          echo "Endpoint = ${{ env.SERVER_IP }}:51820"
          echo "PersistentKeepalive = 25"
          echo ""
          echo "=========================================="
          echo ""
          echo "آی‌پی سرور: ${{ env.SERVER_IP }}"
          echo "پورت: 51820"

      - name: نگهداری اتصال
        run: sleep 21600
