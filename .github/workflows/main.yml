name: 'WireGuard VPN'

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-latest
    steps:
      - name: نصب WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard

      - name: فعال کردن IP Forwarding
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1

      - name: ساخت کلیدهای سرور
        run: |
          sudo mkdir -p /etc/wireguard
          cd /etc/wireguard
          sudo umask 077
          sudo wg genkey | sudo tee privatekey | sudo wg pubkey | sudo tee publickey
          sudo chmod 600 privatekey

      - name: ساخت کلیدهای کلاینت
        run: |
          cd /etc/wireguard
          sudo umask 077
          sudo wg genkey | sudo tee client_privatekey | sudo wg pubkey | sudo tee client_publickey
          sudo chmod 600 client_privatekey

      - name: ساخت فایل کانفیگ سرور
        run: |
          IP=$(curl -s ifconfig.me)
          SERVER_PRIVATE_KEY=$(sudo cat /etc/wireguard/privatekey)
          CLIENT_PUBLIC_KEY=$(sudo cat /etc/wireguard/client_publickey)
          
          sudo bash -c "cat > /etc/wireguard/wg0.conf" <<EOT
[Interface]
PrivateKey = $SERVER_PRIVATE_KEY
Address = 10.0.0.1/24
ListenPort = 51820
PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

[Peer]
PublicKey = $CLIENT_PUBLIC_KEY
AllowedIPs = 10.0.0.2/32
EOT

      - name: راه‌اندازی WireGuard
        run: |
          sudo wg-quick up wg0
          sudo wg show

      - name: نمایش کانفیگ کلاینت
        run: |
          IP=$(curl -s ifconfig.me)
          SERVER_PUBLIC_KEY=$(sudo cat /etc/wireguard/publickey)
          CLIENT_PRIVATE_KEY=$(sudo cat /etc/wireguard/client_privatekey)
          
          echo "=========================================="
          echo "کانفیگ کلاینت - کد زیر را کامل کپی کن"
          echo "=========================================="
          echo ""
          echo "[Interface]"
          echo "PrivateKey = $CLIENT_PRIVATE_KEY"
          echo "Address = 10.0.0.2/24"
          echo "DNS = 1.1.1.1"
          echo ""
          echo "[Peer]"
          echo "PublicKey = $SERVER_PUBLIC_KEY"
          echo "AllowedIPs = 0.0.0.0/0"
          echo "Endpoint = $IP:51820"
          echo "PersistentKeepalive = 25"
          echo ""
          echo "=========================================="
          echo ""
          echo "آی‌پی سرور: $IP"
          echo "پورت: 51820"

      - name: نگهداری اتصال
        run: sleep 21600
