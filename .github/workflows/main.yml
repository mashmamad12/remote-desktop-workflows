name: 'WireGuard VPN'

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-latest
    steps:
      - name: نصب WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard

      - name: نصب و اجرای wg-easy
        run: |
          docker run -d \
            --name=wg-easy \
            -e WG_HOST=$(curl -s ifconfig.me) \
            -e PASSWORD=Admin123! \
            -p 51820:51820/udp \
            -p 51821:51821/tcp \
            --cap-add=NET_ADMIN \
            --cap-add=SYS_MODULE \
            weejewel/wg-easy

      - name: صبر برای بالا آمدن سرویس
        run: sleep 15

      - name: نمایش آی‌پی سرور
        run: |
          IP=$(curl -s ifconfig.me)
          echo "آی‌پی سرور: $IP"
          echo "پورت UDP: 51820"
          echo "رمز مدیریت: Admin123!"

      - name: بررسی فایل کانفیگ سرور
        run: |
          echo "=== بررسی مستقیم فایل کانفیگ ==="
          docker exec wg-easy cat /etc/wireguard/wg0.conf 2>/dev/null || echo "فایل هنوز ساخته نشده"
          echo ""

      - name: اضافه کردن کلاینت اول
        run: |
          echo "=== اضافه کردن کلاینت جدید ==="
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"name":"myphone"}' \
            http://localhost:51821/api/wireguard/client
          echo ""

      - name: گرفتن کانفیگ کلاینت
        run: |
          echo "=== کانفیگ کلاینت myphone ==="
          curl -s http://localhost:51821/api/wireguard/client/myphone
          echo ""

      - name: نگهداری اتصال
        run: sleep 21600
