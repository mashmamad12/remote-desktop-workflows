name: 'WireGuard VPN'

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-latest
    steps:
      - name: نصب WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard

      - name: فعال کردن IP Forwarding
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1

      - name: ساخت کلیدها و کانفیگ
        run: |
          # ساخت دایرکتوری با دسترسی مناسب
          sudo mkdir -p /etc/wireguard
          sudo chmod 755 /etc/wireguard
          cd /etc/wireguard
          
          # ساخت کلید سرور
          sudo umask 077
          echo "ساخت کلید سرور..."
          sudo wg genkey | sudo tee privatekey > /dev/null
          sudo cat privatekey | sudo wg pubkey | sudo tee publickey > /dev/null
          
          # ساخت کلید کلاینت
          echo "ساخت کلید کلاینت..."
          sudo wg genkey | sudo tee client_privatekey > /dev/null
          sudo cat client_privatekey | sudo wg pubkey | sudo tee client_publickey > /dev/null
          
          # گرفتن آی‌پی سرور
          IP=$(curl -s ifconfig.me)
          SERVER_PRIVATE_KEY=$(sudo cat privatekey)
          CLIENT_PUBLIC_KEY=$(sudo cat client_publickey)
          
          echo "آی‌پی سرور: $IP"
          
          # حذف فایل قبلی اگر وجود دارد
          sudo rm -f /etc/wireguard/wg0.conf
          
          # نوشتن فایل کانفیگ سرور با echo
          echo "[Interface]" | sudo tee -a /etc/wireguard/wg0.conf > /dev/null
          echo "PrivateKey = $SERVER_PRIVATE_KEY" | sudo tee -a /etc/wireguard/wg0.conf > /dev/null
          echo "Address = 10.0.0.1/24" | sudo tee -a /etc/wireguard/wg0.conf > /dev/null
          echo "ListenPort = 51820" | sudo tee -a /etc/wireguard/wg0.conf > /dev/null
          echo "PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE" | sudo tee -a /etc/wireguard/wg0.conf > /dev/null
          echo "PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE" | sudo tee -a /etc/wireguard/wg0.conf > /dev/null
          echo "" | sudo tee -a /etc/wireguard/wg0.conf > /dev/null
          echo "[Peer]" | sudo tee -a /etc/wireguard/wg0.conf > /dev/null
          echo "PublicKey = $CLIENT_PUBLIC_KEY" | sudo tee -a /etc/wireguard/wg0.conf > /dev/null
          echo "AllowedIPs = 10.0.0.2/32" | sudo tee -a /etc/wireguard/wg0.conf > /dev/null
          
          # ذخیره آی‌پی برای مرحله بعد
          echo "SERVER_IP=$IP" >> $GITHUB_ENV
          
          echo "فایل کانفیگ ساخته شد:"
          sudo cat /etc/wireguard/wg0.conf

      - name: راه‌اندازی WireGuard
        run: |
          echo "شروع WireGuard..."
          sudo wg-quick up wg0
          echo "وضعیت WireGuard:"
          sudo wg show

      - name: نمایش کانفیگ کلاینت
        run: |
          SERVER_PUBLIC_KEY=$(sudo cat /etc/wireguard/publickey)
          CLIENT_PRIVATE_KEY=$(sudo cat /etc/wireguard/client_privatekey)
          
          echo "=========================================="
          echo "کانفیگ کلاینت - کد زیر را کامل کپی کن"
          echo "=========================================="
          echo ""
          echo "[Interface]"
          echo "PrivateKey = $CLIENT_PRIVATE_KEY"
          echo "Address = 10.0.0.2/24"
          echo "DNS = 1.1.1.1"
          echo ""
          echo "[Peer]"
          echo "PublicKey = $SERVER_PUBLIC_KEY"
          echo "AllowedIPs = 0.0.0.0/0"
          echo "Endpoint = ${{ env.SERVER_IP }}:51820"
          echo "PersistentKeepalive = 25"
          echo ""
          echo "=========================================="
          echo ""
          echo "آی‌پی سرور: ${{ env.SERVER_IP }}"
          echo "پورت: 51820"

      - name: نگهداری اتصال
        run: sleep 21600
